<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foodics — Organisation Domain</title>
    <link rel="stylesheet" href="/static/css/app.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
<div class="app-layout" id="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <div class="logo-icon">F</div>
            <div>
                <h1>Foodics</h1>
                <span>Organisation Domain</span>
            </div>
        </div>

        <!-- Org Switcher -->
        <div class="org-switcher-wrap">
            <select id="orgSwitcher" class="org-switcher-select" onchange="switchOrg(this.value)">
            </select>
        </div>

        <nav class="sidebar-nav">
            <div class="nav-section-title">Overview</div>
            <a class="nav-item active" data-page="dashboard" onclick="navigate('dashboard')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                Dashboard
            </a>
            <a class="nav-item" data-page="hierarchy" onclick="navigate('hierarchy')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="3"/><line x1="12" y1="8" x2="12" y2="14"/><circle cx="5" cy="19" r="3"/><circle cx="19" cy="19" r="3"/><line x1="12" y1="14" x2="5" y2="16"/><line x1="12" y1="14" x2="19" y2="16"/></svg>
                Hierarchy
            </a>

            <div class="nav-section-title">Business</div>
            <a class="nav-item" data-page="organization" onclick="navigate('organization')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21h18"/><path d="M5 21V7l8-4v18"/><path d="M19 21V11l-6-4"/><line x1="9" y1="9" x2="9" y2="9.01"/><line x1="9" y1="13" x2="9" y2="13.01"/><line x1="9" y1="17" x2="9" y2="17.01"/></svg>
                Organisation
            </a>
            <a class="nav-item" data-page="brands" onclick="navigate('brands')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
                Brands
            </a>
            <a class="nav-item" data-page="legal-entities" onclick="navigate('legal-entities')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v3"/><line x1="12" y1="12" x2="12" y2="12.01"/></svg>
                Legal Entities
            </a>
            <a class="nav-item" data-page="locations" onclick="navigate('locations')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
                Locations
            </a>

            <div class="nav-section-title">People</div>
            <a class="nav-item" data-page="users" onclick="navigate('users')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
                Users
            </a>
            <a class="nav-item" data-page="roles" onclick="navigate('roles')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                Roles
            </a>
        </nav>

        <div class="sidebar-footer">
            <a class="nav-item logout-item" onclick="logout()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                Logout
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <div class="top-bar">
            <h2 id="pageTitle">Dashboard</h2>
            <div class="flex items-center gap-3">
                <span class="text-sm text-muted" id="currentOrgName"></span>
            </div>
        </div>
        <div class="page-content" id="pageContainer"></div>
    </main>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<!-- Modal Overlay -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
    <div class="modal" id="modalContent"></div>
</div>

<script src="/static/js/api.js"></script>
<script src="/static/js/app.js"></script>
<script src="/static/js/pages/dashboard.js"></script>
<script src="/static/js/pages/hierarchy.js"></script>
<script src="/static/js/pages/organization.js"></script>
<script src="/static/js/pages/brands.js"></script>
<script src="/static/js/pages/legal-entities.js"></script>
<script src="/static/js/pages/locations.js"></script>
<script src="/static/js/pages/users.js"></script>
<script src="/static/js/pages/roles.js"></script>
</body>
</html>
