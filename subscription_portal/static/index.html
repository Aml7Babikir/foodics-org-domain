<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Foodics Subscription Portal</title>
<link rel="stylesheet" href="static/css/styles.css" />
</head>
<body>
<header class="app-header">

    <div class="logo">F</div>

      <div class="brand-title">Foodics Subscription Portal</div>
      <div class="brand-sub">Internal · one screen for Sales, CS, and Catalog Admin</div>
    </div>

      <button data-persona="admin" class="persona-btn">Product / Admin</button>

  </div>
</header>

<main id="view-root"></main>

<div id="toast" class="toast"></div>

<script src="static/js/api.js"></script>

</html>
